name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e backend[dev]
      - name: Lint
        run: ruff check backend/app backend/tests
      - name: Type check
        run: mypy backend/app --ignore-missing-imports
      - name: Tests
        run: pytest backend
      - name: Agent eval gates
        run: pytest backend/tests/test_eval_gates.py -q
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smartcs-eval-report
          path: backend/reports/eval_report.md
      - name: Docker build
        run: docker build -f backend/Dockerfile .

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartcs
          POSTGRES_PASSWORD: smartcs
          POSTGRES_DB: smartcs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartcs -d smartcs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.6
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e backend[dev]
      - name: Service integration tests
        run: pytest backend/tests/integration -q
        env:
          SMARTCS_RUN_INTEGRATION: "1"
          DATA_BACKEND: postgres
          REDIS_BACKEND: redis
          KB_BACKEND: qdrant
          DATABASE_URL: postgresql+psycopg://smartcs:smartcs@localhost:5432/smartcs
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
