services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      DATA_BACKEND: ${DATA_BACKEND:-postgres}
      KB_BACKEND: ${KB_BACKEND:-qdrant}
      REDIS_BACKEND: ${REDIS_BACKEND:-redis}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      DATABASE_URL: postgresql+psycopg://smartcs:smartcs@postgres:5432/smartcs
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - jaeger

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartcs
      POSTGRES_PASSWORD: smartcs
      POSTGRES_DB: smartcs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  qdrant_data:
  grafana_data:
